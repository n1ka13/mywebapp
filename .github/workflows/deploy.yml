name: Deploy to Target Node

on:
  workflow_call:

jobs:
  deploy:
    name: Deploy & Verify to VM2
    runs-on: self-hosted
    env:
      SSH_OPTS: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/id_rsa"
    steps:
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy via SSH
        run: |
          export SSH_AUTH_SOCK=""

          ssh $SSH_OPTS ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }} "
            cd /opt/mywebapp &&
            echo '${{ secrets.GITHUB_TOKEN }}' | sudo docker login ghcr.io -u '${{ github.actor }}' --password-stdin &&
            sudo docker compose pull &&
            sudo systemctl restart mywebapp.service
          "

      - name: Verify deployment
        run: |
          export SSH_AUTH_SOCK=""

          ssh $SSH_OPTS ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }} "
            set -e
            cd /opt/mywebapp

            for i in {1..30}; do
              STATUS_MAIN=\$(curl -o /dev/null -s -w '%{http_code}' http://localhost:8080/)

              STATUS_HEALTH=\$(curl -o /dev/null -s -w '%{http_code}' http://localhost:8080/health/alive)

              if [ \"\$STATUS_MAIN\" -eq 200 ] && [ \"\$STATUS_HEALTH\" -eq 403 ]; then
                echo \"App is ready and security checks passed (Main: 200, Health: 403)\"
                exit 0
              fi

              echo \"Waiting for app... attempt \$i/30 (Main: \$STATUS_MAIN, Health: \$STATUS_HEALTH)\"
              sleep 5
            done

            echo \"App failed health check\"
            sudo docker compose ps
            sudo docker compose logs web --tail=100
            sudo docker compose logs nginx --tail=100
            exit 1
          "
