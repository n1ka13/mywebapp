deploy:
    name: Deploy & Verify to VM2 (Pure Pull Method)
    needs: build-and-push
    runs-on: self-hosted
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      SSH_OPTS: "-o IdentitiesOnly=yes -o StrictHostKeyChecking=no -o BatchMode=yes -i ~/.ssh/id_rsa"
    steps:
      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Deploy via SSH (Pull & Restart)
        run: |
          export SSH_AUTH_SOCK=""
          
          ssh $SSH_OPTS ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }} "
            echo '${{ secrets.GITHUB_TOKEN }}' | sudo docker login ghcr.io -u '${{ github.actor }}' --password-stdin &&
            cd /opt/mywebapp &&
            sudo docker compose pull &&
            sudo docker compose up -d --force-recreate
          "

      - name: Verify deployment (Smart Loop)
        run: |
          export SSH_AUTH_SOCK=""
          
          ssh $SSH_OPTS ${{ secrets.TARGET_USER }}@${{ secrets.TARGET_HOST }} "
            set -e
            cd /opt/mywebapp

            for i in {1..30}; do
              STATUS_MAIN=\$(curl -o /dev/null -s -w '%{http_code}' http://localhost:8080/)

              if [ \"\$STATUS_MAIN\" -eq 200 ]; then
                echo 'Головна сторінка доступна (200 OK)!'

                STATUS_HEALTH=\$(curl -o /dev/null -s -w '%{http_code}' http://localhost:8080/health/alive)
                if [ \"\$STATUS_HEALTH\" -ne 403 ]; then
                  echo 'Помилка безпеки. Доступ до /health/alive не заблоковано. Код: '\$STATUS_HEALTH
                  exit 1
                fi

                echo 'Розгортання успішно верифіковано'
                exit 0
              fi

              echo 'Очікування готовності застосунку... спроба \$i/30'
              sleep 5
            done

            echo 'Помилка! Застосунок не пройшов перевірку'
            sudo docker compose ps
            sudo docker compose logs web --tail=50
            sudo docker compose logs nginx --tail=50
            exit 1
          "