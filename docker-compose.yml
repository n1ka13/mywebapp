services:
  database:
    image: mariadb:11
    container_name: mywebapp-db
    restart: always

    environment:
      MARIADB_ROOT_PASSWORD: rootpassword
      MARIADB_DATABASE: mydatabase
      MARIADB_USER: webuser
      MARIADB_PASSWORD: webpassword

    volumes:
      - db_data:/var/lib/mysql

    networks:
      - custom_lab_network

    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/n1ka13/mywebapp:latest
    container_name: mywebapp-app
    restart: always

    environment:
      DB_HOST: database
      DB_USER: webuser
      DB_PASSWORD: webpassword
      DB_NAME: mydatabase
      PORT: 8080

    depends_on:
      database:
        condition: service_healthy

    networks:
      - custom_lab_network

  nginx:
    image: nginx:alpine
    container_name: mywebapp-nginx
    restart: always

    ports:
      - "8080:80"

    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro

    depends_on:
      web:
        condition: service_started

    networks:
      - custom_lab_network

networks:
  custom_lab_network:
    driver: bridge

volumes:
  db_data:
